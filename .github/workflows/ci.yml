name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint with flake8 ──────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --config=.flake8 \
            --statistics \
            --count

  # ── 2. Run pytest ────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip           # cache ~/.cache/pip between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env for tests
        # Provide defaults so load_dotenv() in the module doesn't fail
        run: |
          echo "ST_MODEL_NAME=all-MiniLM-L6-v2"       > .env
          echo "DEFAULT_RESUME_PATH=sample_resume.txt" >> .env
          echo "DEFAULT_JD_PATH=job_description.txt"   >> .env

      - name: Run pytest with coverage
        run: |
          python -m pytest test_resume_analyzer.py \
            -v \
            --tb=short \
            --cov=resume_analyzer \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ── 3. Verify Docker build ───────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # build only — no registry push in CI
          tags: ai-resume-analyzer:ci
          cache-from: type=gha # GitHub Actions layer cache
          cache-to: type=gha,mode=max
