services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-resume-analyzer:latest

    # Maps container port 8501 → host port 8501 (works on Mac & Windows)
    ports:
      - "8501:8501"

    # Named volume persists the HuggingFace model cache across restarts
    # so all-MiniLM-L6-v2 (~90 MB) is only downloaded once.
    volumes:
      - hf_cache:/app/.cache/huggingface

    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - HF_HOME=/app/.cache/huggingface

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  hf_cache:
    driver: local
